version: '3.8'

# Docker Compose override pour l'environnement de test
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  app:
    environment:
      - NODE_ENV=test
      - VITE_APP_ENV=test
      - VITE_API_URL=http://test-server:3001/api
    env_file:
      - .env.test
    ports:
      - "3000:80"
